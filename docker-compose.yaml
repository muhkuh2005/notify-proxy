services:
  app:
    image: ${NOTIFY_PROXY_IMAGE:-ghcr.io/your-org/notify-proxy:main}
    pull_policy: always
    expose:
      - "8000"
    volumes:
      - data:/data
    environment:
      DATABASE_URL: sqlite:////data/notify-proxy.db
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COOLIFY_BASE_URL: ${COOLIFY_BASE_URL:-}
      COOLIFY_TOKEN: ${COOLIFY_TOKEN:-}
      COOLIFY_INCOMING_TOKEN: ${COOLIFY_INCOMING_TOKEN:-}
      VERIFICATION_BOT_TOKEN: ${VERIFICATION_BOT_TOKEN:-}
      OAUTH_ENABLED_PROVIDERS: ${OAUTH_ENABLED_PROVIDERS:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      BASE_URL: ${BASE_URL:-}
      OAUTH_ADMIN_EMAILS: ${OAUTH_ADMIN_EMAILS:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
      RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-true}
      RATELIMIT_LOGIN_PER_MIN: ${RATELIMIT_LOGIN_PER_MIN:-10}
      RATELIMIT_WEBHOOK_PER_MIN: ${RATELIMIT_WEBHOOK_PER_MIN:-120}
      NOTIFY_RETRY_ATTEMPTS: ${NOTIFY_RETRY_ATTEMPTS:-3}
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "5"
    labels:
      - "traefik.http.services.notify-proxy.loadbalancer.server.port=8000"
    networks:
      - default
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  data:

networks:
  default:
    name: notify_proxy_network
  coolify:
    external: true
