<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — notify-proxy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/admin" class="brand">notify-proxy</a>
    <div class="nav-links">
      <a href="/admin/bots" class="nav-link">Bots</a>
      
      <a href="/admin/settings" class="nav-link">Settings</a>
      <a href="/admin/users" class="nav-link">Users</a>
      <a href="/admin/projects/new" class="btn-sm">+ Project</a>
      
      
    </div>
  </nav>
  <main>
    
<h1>Projects</h1>





<div class="toolbar">
  
  <a href="/admin/projects/new" class="btn">+ New Project</a>
  
  
  <input type="text" id="name-filter" placeholder="Filter by name…"
         oninput="applyFilter()"
         style="max-width:180px;margin-left:auto">
  <select id="group-filter" onchange="applyFilter()" style="width:auto;min-width:140px">
    <option value="">All groups</option>
  </select>
</div>


<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Destinations</th>
      <th>Filter</th>
      <th>Webhook URL</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  
    <tr>
      <td>
        <a href="/admin/projects/1">
          My First Project
        </a>
        
      </td>
      <td>1</td>
      <td>
        <span style="color:var(--text-muted);font-size:12px">all</span>
      </td>
      <td>
        
        <button class="btn-sm" type="button"
                onclick="copyText(this, 'http://testserver/webhook/c2Jb0lhsRMFoV0_zIODQfAxUcZ3rg1iR4MeixOE743c')">Copy URL</button>
        
      </td>
      <td>
        <a href="/admin/projects/1" class="btn-sm">Edit</a>
      </td>
    </tr>
  
  </tbody>
</table>


<script>
(function() {
  var groups = new Set();
  document.querySelectorAll('tbody tr').forEach(function(row) {
    var scope = row.querySelector('.project-scope');
    if (scope) groups.add(scope.textContent.trim().replace(/\s*\/\s*$/, ''));
  });
  var sel = document.getElementById('group-filter');
  groups.forEach(function(g) {
    var opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    sel.appendChild(opt);
  });
  if (groups.size === 0) sel.style.display = 'none';
})();

function applyFilter() {
  var name = document.getElementById('name-filter').value.toLowerCase();
  var group = document.getElementById('group-filter').value;
  document.querySelectorAll('tbody tr').forEach(function(row) {
    var cell = row.querySelector('td:first-child');
    var nameMatch = !name || cell.textContent.toLowerCase().includes(name);
    var scopeEl = cell.querySelector('.project-scope');
    var scopeText = scopeEl ? scopeEl.textContent.trim().replace(/\s*\/\s*$/, '') : '';
    var groupMatch = !group || scopeText === group;
    row.style.display = nameMatch && groupMatch ? '' : 'none';
  });
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    var orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--ok)';
    btn.style.borderColor = 'var(--ok)';
    setTimeout(function() {
      btn.textContent = orig;
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 1500);
  });
}
</script>

  </main>
</body>
</html>
